<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gowtham M S - Advanced Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Welcome Screen -->
    <section id="welcome">
        <h1>Gowtham M S</h1>
        <p>Advanced Image Gallery Project</p>
        <button id="startBtn">Enter Gallery</button>
    </section>

    <!-- Gallery Page -->
    <section id="galleryPage">

        <header>
            <h1>Advanced Image Gallery</h1>
        </header>

        <div class="search-box">
            <input type="text" id="search" placeholder="Search Category...">
        </div>

        <div class="filters">
            <button onclick="filterImages('all')">All</button>
            <button onclick="filterImages('nature')">Nature</button>
            <button onclick="filterImages('city')">City</button>
            <button onclick="filterImages('animal')">Animals</button>
        </div>

        <div class="gallery">

            <img src="https://picsum.photos/id/1015/500/400" class="nature">
            <img src="https://picsum.photos/id/1016/500/400" class="nature">
            <img src="https://picsum.photos/id/1031/500/400" class="city">
            <img src="https://picsum.photos/id/1035/500/400" class="city">
            <img src="https://picsum.photos/id/237/500/400" class="animal">
            <img src="https://picsum.photos/id/1025/500/400" class="animal">

        </div>

    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">

        <span class="close">&times;</span>

        <img id="lightboxImg">

        <div class="nav">
            <button id="prev">Previous</button>
            <button id="next">Next</button>
        </div>

        <div class="counter" id="counter"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
