<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixed Media Gallery | Gowtham M.S.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gallery-wrapper">
        <header class="gallery-header">
            <h1>Gowtham M.S.</h1>
            <p>Diverse Portfolio Gallery</p>
        </header>

        <div class="gallery-grid" id="mainGrid">
            <div class="gallery-item" data-type="architecture">
                <img src="https://picsum.photos/600/400?random=11" alt="Cityscape">
                <div class="overlay"><span>Structure</span></div>
            </div>

            <div class="gallery-item" data-type="nature">
                <img src="https://picsum.photos/600/600?random=12" alt="Mountain Pass">
                <div class="overlay"><span>Organic</span></div>
            </div>

            <div class="gallery-item" data-type="tech">
                <img src="https://picsum.photos/400/600?random=13" alt="Abstract Code">
                <div class="overlay"><span>Digital</span></div>
            </div>

            <div class="gallery-item" data-type="people">
                <img src="https://picsum.photos/600/400?random=14" alt="Portrait">
                <div class="overlay"><span>Culture</span></div>
            </div>

            <div class="gallery-item" data-type="architecture">
                <img src="https://picsum.photos/400/800?random=15" alt="Modern Skyscraper">
                <div class="overlay"><span>Structure</span></div>
            </div>

            <div class="gallery-item" data-type="nature">
                <img src="https://picsum.photos/600/400?random=16" alt="Coastline">
                <div class="overlay"><span>Organic</span></div>
            </div>

            <div class="gallery-item" data-type="tech">
                <img src="https://picsum.photos/600/400?random=17" alt="Drone View">
                <div class="overlay"><span>Digital</span></div>
            </div>

            <div class="gallery-item" data-type="people">
                <img src="https://picsum.photos/400/400?random=18" alt="Market Crowd">
                <div class="overlay"><span>Culture</span></div>
            </div>
        </div>
    </div>

    <div id="lightbox-modal" class="lightbox">
        <span class="close-btn">&times;</span>
        <button class="nav-btn prev-btn" id="prev">&#10094;</button>
        <div class="lb-content-wrapper">
            <img class="lightbox-img" id="expanded-img" src="" alt="Expanded View">
        </div>
        <button class="nav-btn next-btn" id="next">&#10095;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
