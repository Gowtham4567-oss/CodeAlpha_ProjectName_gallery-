<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Interactive Image Gallery</h1>
        <div class="filter-buttons">
            <button class="btn active" data-filter="all">All</button>
            <button class="btn" data-filter="nature">Nature</button>
            <button class="btn" data-filter="architecture">Architecture</button>
            <button class="btn" data-filter="animals">Animals</button>
        </div>
    </header>

    <main>
        <div class="gallery-container">
            <div class="gallery-item" data-category="nature">
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600&auto=format&fit=crop&q=60" alt="Beautiful Valley">
                <div class="caption">Beautiful Valley</div>
            </div>
            <div class="gallery-item" data-category="nature">
                <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600&auto=format&fit=crop&q=60" alt="Foggy Mountains">
                <div class="caption">Foggy Mountains</div>
            </div>

            <div class="gallery-item" data-category="architecture">
                <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=600&auto=format&fit=crop&q=60" alt="Modern Skyscraper">
                <div class="caption">Modern Skyscraper</div>
            </div>
            <div class="gallery-item" data-category="architecture">
                <img src="https://images.unsplash.com/photo-1511818966892-d7d671e672a2?w=600&auto=format&fit=crop&q=60" alt="Classic Architecture">
                <div class="caption">Classic Architecture</div>
            </div>

            <div class="gallery-item" data-category="animals">
                <img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=600&auto=format&fit=crop&q=60" alt="Majestic Lion">
                <div class="caption">Majestic Lion</div>
            </div>
            <div class="gallery-item" data-category="animals">
                <img src="https://images.unsplash.com/photo-1534567153574-2b12153a87f0?w=600&auto=format&fit=crop&q=60" alt="Playful Golden Retriever">
                <div class="caption">Golden Retriever</div>
            </div>
        </div>
    </main>

    <div class="lightbox" id="lightbox">
        <span class="close-btn">&times;</span>
        <button class="nav-btn prev-btn">&#10094;</button>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="Popup View">
            <div id="lightbox-caption"></div>
        </div>
        <button class="nav-btn next-btn">&#10095;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
