<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gowtham M S - Ultimate Gallery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
</div>

<header>
    <h1>Gowtham M S</h1>

    <div class="controls">
        <button id="themeBtn">🌙 Theme</button>
        <button id="uploadBtn">📤 Upload</button>
        <input type="file" id="fileInput" accept="image/*" hidden>
    </div>
</header>

<div class="filters">
    <button data-category="food">Food</button>
    <button data-category="nature">Nature</button>
    <button data-category="technology">Technology</button>
    <button data-category="medicine">Medicine</button>
    <button data-category="company">Company</button>
    <button data-category="actors">Actors</button>
</div>

<div id="gallery"></div>

<div id="lightbox">
    <span id="close">×</span>
    <img id="lightboxImg">

    <div class="lightbox-buttons">
        <button id="downloadBtn">⬇ Download</button>
        <button id="fullscreenBtn">⛶ Fullscreen</button>
        <button id="favoriteBtn">❤ Favorite</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
